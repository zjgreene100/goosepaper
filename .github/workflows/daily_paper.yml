name: Daily Newspaper Delivery

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Ingredients
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0

      - name: The "I'm Done With Errors" Install
        run: |
          # We manually install all the parts Goosepaper needs first
          pip install weasyprint goose3 requests rmapy==0.3.1 --break-system-packages
          # We tell pip to grab Goosepaper but IGNORE the broken installer parts
          pip install goosepaper --no-deps --break-system-packages

      - name: Generate and Upload Paper
        env:
          REMARKABLE_AUTH_TOKEN: ${{ secrets.REMARKABLE_AUTH_TOKEN }}
        run: |
          # We run the command directly
          goosepaper --config config.json --output DailyPaper.pdf --upload
