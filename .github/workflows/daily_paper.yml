name: Daily Newspaper Delivery

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Ingredients
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info

      - name: Manual Setup
        run: |
          rm -rf goosepaper
          # Using the anonymous clone URL to avoid the username error
          git clone https://github.com/j6y3/goosepaper.git .
          pip install weasyprint goose3 requests rmapy==0.1.1 --break-system-packages

      - name: Generate and Upload Paper
        env:
          REMARKABLE_AUTH_TOKEN: ${{ secrets.REMARKABLE_AUTH_TOKEN }}
        run: |
          # We are already in the folder now because of the '.' in the clone command
          export PYTHONPATH=$PYTHONPATH:.
          python3 -m goosepaper.cli --config config.json --output DailyPaper.pdf --upload
