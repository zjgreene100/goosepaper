name: Daily Newspaper Delivery

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Ingredients
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0
          pip install weasyprint goose3 requests rmapy==0.3.1 --break-system-packages

      - name: Build Local Engine
        run: |
          # We are downloading the raw file directly to bypass the 'Username' gatekeeper
          curl -s https://raw.githubusercontent.com/j6y3/goosepaper/main/goosepaper/cli.py -o goosepaper/cli.py
          curl -s https://raw.githubusercontent.com/j6y3/goosepaper/main/goosepaper/goosepaper.py -o goosepaper/goosepaper.py
          curl -s https://raw.githubusercontent.com/j6y3/goosepaper/main/goosepaper/__init__.py -o goosepaper/__init__.py
          # Create a helper file so Python treats the folder as a module
          touch goosepaper/__init__.py

      - name: Generate and Upload Paper
        env:
          REMARKABLE_AUTH_TOKEN: ${{ secrets.REMARKABLE_AUTH_TOKEN }}
        run: |
          python3 -m goosepaper.cli --config config.json --output DailyPaper.pdf --upload
