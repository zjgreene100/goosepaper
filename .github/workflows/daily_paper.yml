name: Daily Newspaper Delivery

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Ingredients
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0
          pip install weasyprint goose3 requests rmapy==0.3.1 --break-system-packages

      - name: Build Local Engine
        run: |
          mkdir -p goosepaper/util
          curl -sL https://raw.githubusercontent.com/j6y3/goosepaper/main/goosepaper/cli.py -o goosepaper/cli.py
          curl -sL https://raw.githubusercontent.com/j6y3/goosepaper/main/goosepaper/goosepaper.py -o goosepaper/goosepaper.py
          curl -sL https://raw.githubusercontent.com/j6y3/goosepaper/main/goosepaper/__init__.py -o goosepaper/__init__.py
          curl -sL https://raw.githubusercontent.com/j6y3/goosepaper/main/goosepaper/util/__init__.py -o goosepaper/util/__init__.py
          curl -sL https://raw.githubusercontent.com/j6y3/goosepaper/main/goosepaper/util/fonts.py -o goosepaper/util/fonts.py

      - name: Generate and Upload Paper
        env:
          REMARKABLE_AUTH_TOKEN: ${{ secrets.REMARKABLE_AUTH_TOKEN }}
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          python3 goosepaper/cli.py --config config.json --output DailyPaper.pdf --upload
