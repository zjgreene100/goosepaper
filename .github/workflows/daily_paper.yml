name: Daily Newspaper Delivery

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Ingredients
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info

      - name: Install Goosepaper (Direct Version)
        run: |
          python -m pip install --upgrade pip
          # We are installing a version that bypasses the broken 'requirements.txt' issue
          pip install goosepaper==0.6.0 --break-system-packages

      - name: Generate and Upload Paper
        env:
          REMARKABLE_AUTH_TOKEN: ${{ secrets.REMARKABLE_AUTH_TOKEN }}
        run: |
          goosepaper --config config.json --output DailyPaper.pdf --upload
